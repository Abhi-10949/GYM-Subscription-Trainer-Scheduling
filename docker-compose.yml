services:
  database:
    image: mysql:8.4
    container_name: gym-management-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: gym_management_system
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: gym-management-backend
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://database:3306/gym_management_system?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: root
      DB_PASSWORD: rootpassword
      APP_CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost,http://frontend
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8080/api
    container_name: gym-management-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  mysql_data:
